name: Release

on:
  push:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  verify:
    name: Verify Main
    runs-on: ubuntu-latest
    # Skip verification on release-please commits (version bumps, changelog updates)
    if: "!startsWith(github.event.head_commit.message, 'chore(main): release')"

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Lint
        run: bun run lint

      - name: Format check
        run: bun run format:check

      - name: Type check
        run: bun run typecheck

      - name: Run tests
        run: bun run test

      - name: Build
        run: bun run build

  release:
    name: Release
    runs-on: ubuntu-latest
    needs: verify
    # Release Please release commits intentionally skip `verify`.
    # `always()` keeps this job runnable after a skipped dependency so tags,
    # releases, and publish fan-out still happen on merged release PRs.
    if: ${{ always() && !failure() && !cancelled() }}
    permissions:
      contents: write
      pull-requests: write
      issues: write

    outputs:
      paths_released: ${{ steps.release.outputs.paths_released }}

    steps:
      - name: Release Please
        id: release
        uses: googleapis/release-please-action@v4
        with:
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json

  publish:
    name: Publish ${{ matrix.path }}
    runs-on: ubuntu-latest
    needs: release
    # always() is required to work around GitHub Actions' transitive skip
    # propagation (actions/runner#2205): when `verify` is skipped on release
    # commits, descendants inherit that skip unless they opt out with always().
    if: ${{ always() && needs.release.result == 'success' && needs.release.outputs.paths_released != '[]' && needs.release.outputs.paths_released != '' }}
    environment: npm
    permissions:
      contents: read
      id-token: write

    strategy:
      fail-fast: false
      matrix:
        path: ${{ fromJson(needs.release.outputs.paths_released) }}

    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          ref: ${{ github.ref }}

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2

      - name: Setup Node.js for npm publish
        uses: actions/setup-node@v4
        with:
          node-version: "24"

      - name: Install dependencies
        # Release Please bumps workspace package versions without syncing bun.lock.
        # Use a non-frozen install here so publish can proceed from the release commit.
        run: bun install

      - name: Build
        run: cd ${{ matrix.path }} && bun run build

      - name: Publish package to npm
        run: cd ${{ matrix.path }} && npm publish --provenance --access public
